name: Validate HTML

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate-html:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: HTML5 Validator
        uses: Cyb3r-Jak3/html5validator-action@v7.2.0
        with:
          root: .
          css: false
          log_level: 'INFO'
